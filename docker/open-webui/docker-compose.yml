services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main

    container_name: open-webui

    restart: unless-stopped

    ports:
      - "3000:8080"

    volumes:
      - ./data:/app/backend/data

    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434

    extra_hosts:
      - "host.docker.internal:host-gateway"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
